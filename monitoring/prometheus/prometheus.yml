global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'opspilot_backend'
    metrics_path: '/metrics'
    static_configs:
      # host.docker.internal allows Docker container to reach the host machine where Node.js backend runs
      - targets: ['host.docker.internal:5001']
